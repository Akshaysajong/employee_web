version: '3.8'

services:
  web:
    build: .
    command: /app/start.sh
    working_dir: /app
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:80"
    env_file:
      - .env
    depends_on:
      # - db
      - redis
    restart: unless-stopped

  # db:
  #   image: postgres:14.12
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data/
  #   environment:
  #     - POSTGRES_DB=${DB_NAME}
  #     - POSTGRES_USER=${DB_USER}
  #     - POSTGRES_PASSWORD=${DB_PASSWORD}
  #   ports:
  #     - "5432:5432"
  #   restart: unless-stopped

  redis:
    image: redis:6-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  celery:
    build: .
    command: bash -c "celery -A core worker --loglevel=info"
    working_dir: /app
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - redis
      # - db
    restart: unless-stopped

  celery-beat:
    build: .
    command: bash -c "celery -A core beat --loglevel=info"
    working_dir: /app
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - redis
      # - db
    restart: unless-stopped

volumes:
  # postgres_data:
  redis_data:
  static_volume:
  media_volume:
